<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Symbol -->
  <g transform="translate(0, 0)">
    <!-- Outer ring -->
    <circle cx="30" cy="30" r="26" fill="none" stroke="#fafafa" stroke-width="1.5" opacity="0.9"/>
    
    <!-- Neural pathway (M shape) -->
    <path d="M 12 42 
             Q 12 18, 22 18 
             Q 30 18, 30 30 
             Q 30 18, 38 18 
             Q 48 18, 48 42" 
          fill="none" 
          stroke="#fafafa" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Signal nodes -->
    <circle cx="12" cy="42" r="3" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="30" cy="30" r="3.5" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="48" cy="42" r="3" fill="#4a90a4" filter="url(#glow)"/>
    
    <!-- Central intelligence node -->
    <circle cx="30" cy="22" r="2.5" fill="#fafafa"/>
  </g>
  
  <!-- Wordmark -->
  <text x="70" y="32" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#fafafa" letter-spacing="1">METABRAIN</text>
  <text x="70" y="48" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="10" fill="#4a90a4" letter-spacing="3" font-weight="400">LABS</text>
</svg>
