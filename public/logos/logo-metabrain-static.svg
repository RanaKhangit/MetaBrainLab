<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#fafafa" stroke-width="2" opacity="0.9"/>
  
  <!-- Neural pathway (M shape) -->
  <path d="M 45 130 
           Q 45 60, 70 60 
           Q 100 60, 100 100 
           Q 100 60, 130 60 
           Q 155 60, 155 130" 
        fill="none" 
        stroke="#fafafa" 
        stroke-width="3" 
        stroke-linecap="round"/>
  
  <!-- Signal nodes -->
  <circle cx="45" cy="130" r="5" fill="#4a90a4" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="6" fill="#4a90a4" filter="url(#glow)"/>
  <circle cx="155" cy="130" r="5" fill="#4a90a4" filter="url(#glow)"/>
  
  <!-- Central intelligence node -->
  <circle cx="100" cy="70" r="4" fill="#fafafa"/>
</svg>
