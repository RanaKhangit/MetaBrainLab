<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4a90a4" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Logo Symbol - Large -->
  <g transform="translate(100, 165)">
    <!-- Outer ring -->
    <circle cx="150" cy="150" r="130" fill="none" stroke="#fafafa" stroke-width="3" opacity="0.9"/>
    
    <!-- Neural pathway (M shape) -->
    <path d="M 60 210 
             Q 60 90, 105 90 
             Q 150 90, 150 150 
             Q 150 90, 195 90 
             Q 240 90, 240 210" 
          fill="none" 
          stroke="#fafafa" 
          stroke-width="5" 
          stroke-linecap="round"/>
    
    <!-- Signal nodes -->
    <circle cx="60" cy="210" r="10" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="150" cy="150" r="12" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="240" cy="210" r="10" fill="#4a90a4" filter="url(#glow)"/>
    
    <!-- Central intelligence node -->
    <circle cx="150" cy="105" r="8" fill="#fafafa"/>
  </g>
  
  <!-- Text Content -->
  <g transform="translate(450, 200)">
    <text x="0" y="0" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700" fill="#fafafa" letter-spacing="2">METABRAIN</text>
    <text x="0" y="50" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="24" fill="#4a90a4" letter-spacing="8" font-weight="400">LAB</text>
    
    <line x1="0" y1="80" x2="520" y2="80" stroke="#4a90a4" stroke-width="1" opacity="0.4"/>
    
    <text x="0" y="130" font-family="'Work Sans', sans-serif" font-size="22" fill="#fafafa" opacity="0.8">Engineering the Next Evolution</text>
    <text x="0" y="160" font-family="'Work Sans', sans-serif" font-size="22" fill="#fafafa" opacity="0.8">of Human Intelligence</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="580" font-family="'Work Sans', sans-serif" font-size="18" fill="#4a90a4" text-anchor="middle" letter-spacing="2">metabrainlab.com</text>
</svg>
