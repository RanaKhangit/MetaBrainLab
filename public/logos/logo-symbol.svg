<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
  
  <!-- Neural pathway (M shape) -->
  <path d="M 25 70 
           Q 25 30, 40 30 
           Q 50 30, 50 50 
           Q 50 30, 60 30 
           Q 75 30, 75 70" 
        fill="none" 
        stroke="#1a1a2e" 
        stroke-width="3.5" 
        stroke-linecap="round"/>
  
  <!-- Signal nodes -->
  <circle cx="25" cy="70" r="5" fill="#4a90a4"/>
  <circle cx="50" cy="50" r="6" fill="#4a90a4" filter="url(#glow)"/>
  <circle cx="75" cy="70" r="5" fill="#4a90a4"/>
  
  <!-- Central node -->
  <circle cx="50" cy="38" r="3.5" fill="#1a1a2e"/>
  
</svg>
