<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#fafafa" stroke-width="1" opacity="0.8"/>
  
  <!-- Neural pathway (M shape) -->
  <path d="M 7 22 
           Q 7 10, 11 10 
           Q 16 10, 16 16 
           Q 16 10, 21 10 
           Q 25 10, 25 22" 
        fill="none" 
        stroke="#fafafa" 
        stroke-width="1.5" 
        stroke-linecap="round"/>
  
  <!-- Signal nodes -->
  <circle cx="7" cy="22" r="1.5" fill="#4a90a4"/>
  <circle cx="16" cy="16" r="2" fill="#4a90a4"/>
  <circle cx="25" cy="22" r="1.5" fill="#4a90a4"/>
</svg>
