<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Symbol -->
  <g transform="translate(5, 5)">
    <!-- Outer ring -->
    <circle cx="25" cy="25" r="22" fill="none" stroke="#fafafa" stroke-width="1.5" opacity="0.9"/>
    
    <!-- Neural pathway (M shape) -->
    <path d="M 12 35 
             Q 12 15, 20 15 
             Q 25 15, 25 25 
             Q 25 15, 30 15 
             Q 38 15, 38 35" 
          fill="none" 
          stroke="#fafafa" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Signal nodes -->
    <circle cx="12" cy="35" r="2.5" fill="#4a90a4"/>
    <circle cx="25" cy="25" r="3" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="38" cy="35" r="2.5" fill="#4a90a4"/>
    
    <!-- Central node -->
    <circle cx="25" cy="18" r="1.5" fill="#fafafa"/>
  </g>
  
  <!-- Wordmark -->
  <text x="60" y="30" font-family="'Playfair Display', Georgia, serif" font-size="20" font-weight="700" fill="#fafafa" letter-spacing="0.5">METABRAIN</text>
  <text x="60" y="46" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="10" fill="#4a90a4" letter-spacing="3" font-weight="500">LABS</text>
  
</svg>
