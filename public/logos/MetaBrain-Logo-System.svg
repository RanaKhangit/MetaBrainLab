<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="signalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#fafafa"/>
  
  <!-- VARIANT 1: Primary Symbol Mark -->
  <g transform="translate(100, 80)">
    <text x="0" y="-15" font-family="Georgia, serif" font-size="11" fill="#666" letter-spacing="2">PRIMARY MARK</text>
    
    <!-- Outer ring - closed system / sovereignty -->
    <circle cx="70" cy="70" r="58" fill="none" stroke="#1a1a2e" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Inner recursive loop - M abstracted as neural pathway -->
    <path d="M 35 95 
             Q 35 45, 55 45 
             Q 70 45, 70 70 
             Q 70 45, 85 45 
             Q 105 45, 105 95" 
          fill="none" 
          stroke="#1a1a2e" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
    
    <!-- Signal nodes -->
    <circle cx="35" cy="95" r="4" fill="#4a90a4"/>
    <circle cx="70" cy="70" r="5" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="105" cy="95" r="4" fill="#4a90a4"/>
    
    <!-- Central intelligence point -->
    <circle cx="70" cy="55" r="3" fill="#1a1a2e"/>
    
    <!-- Wordmark -->
    <text x="150" y="60" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="500" fill="#1a1a2e" letter-spacing="1">METABRAIN</text>
    <text x="150" y="88" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="14" fill="#4a90a4" letter-spacing="4" font-weight="400">LABS</text>
  </g>
  
  <!-- VARIANT 2: Symbol Only -->
  <g transform="translate(520, 80)">
    <text x="0" y="-15" font-family="Georgia, serif" font-size="11" fill="#666" letter-spacing="2">SYMBOL ONLY</text>
    
    <circle cx="70" cy="70" r="62" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
    
    <path d="M 32 98 
             Q 32 42, 55 42 
             Q 70 42, 70 72 
             Q 70 42, 85 42 
             Q 108 42, 108 98" 
          fill="none" 
          stroke="#1a1a2e" 
          stroke-width="4" 
          stroke-linecap="round"/>
    
    <circle cx="32" cy="98" r="5" fill="#4a90a4"/>
    <circle cx="70" cy="72" r="6" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="108" cy="98" r="5" fill="#4a90a4"/>
    <circle cx="70" cy="52" r="4" fill="#1a1a2e"/>
  </g>
  
  <!-- VARIANT 3: Wordmark Only -->
  <g transform="translate(100, 250)">
    <text x="0" y="-15" font-family="Georgia, serif" font-size="11" fill="#666" letter-spacing="2">WORDMARK ONLY</text>
    
    <text x="0" y="45" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="500" fill="#1a1a2e" letter-spacing="2">METABRAIN</text>
    <text x="275" y="45" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="16" fill="#4a90a4" letter-spacing="5" font-weight="400">LABS</text>
    
    <line x1="0" y1="58" x2="340" y2="58" stroke="#4a90a4" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- VARIANT 4: Dark Background Version -->
  <g transform="translate(480, 220)">
    <text x="0" y="-15" font-family="Georgia, serif" font-size="11" fill="#666" letter-spacing="2">DARK VARIANT</text>
    
    <rect x="0" y="0" width="240" height="120" rx="4" fill="#1a1a2e"/>
    
    <circle cx="55" cy="60" r="38" fill="none" stroke="#fafafa" stroke-width="1.8" opacity="0.9"/>
    
    <path d="M 32 78 
             Q 32 42, 45 42 
             Q 55 42, 55 60 
             Q 55 42, 65 42 
             Q 78 42, 78 78" 
          fill="none" 
          stroke="#fafafa" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    
    <circle cx="32" cy="78" r="3" fill="#4a90a4"/>
    <circle cx="55" cy="60" r="4" fill="#4a90a4" filter="url(#glow)"/>
    <circle cx="78" cy="78" r="3" fill="#4a90a4"/>
    <circle cx="55" cy="48" r="2.5" fill="#fafafa"/>
    
    <text x="105" y="52" font-family="'Playfair Display', Georgia, serif" font-size="18" font-weight="500" fill="#fafafa" letter-spacing="1">METABRAIN</text>
    <text x="105" y="72" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="10" fill="#4a90a4" letter-spacing="3" font-weight="400">LABS</text>
  </g>
  
  <!-- VARIANT 5: Minimal Monochrome -->
  <g transform="translate(100, 400)">
    <text x="0" y="-15" font-family="Georgia, serif" font-size="11" fill="#666" letter-spacing="2">MONOCHROME</text>
    
    <circle cx="50" cy="50" r="42" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <path d="M 25 70 
             Q 25 30, 40 30 
             Q 50 30, 50 50 
             Q 50 30, 60 30 
             Q 75 30, 75 70" 
          fill="none" 
          stroke="#1a1a2e" 
          stroke-width="2.8" 
          stroke-linecap="round"/>
    
    <circle cx="25" cy="70" r="3.5" fill="#1a1a2e"/>
    <circle cx="50" cy="50" r="4.5" fill="#1a1a2e"/>
    <circle cx="75" cy="70" r="3.5" fill="#1a1a2e"/>
    <circle cx="50" cy="38" r="2.5" fill="#1a1a2e"/>
    
    <text x="110" y="42" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="500" fill="#1a1a2e" letter-spacing="1">METABRAIN</text>
    <text x="110" y="64" font-family="'Work Sans', 'Helvetica Neue', sans-serif" font-size="11" fill="#1a1a2e" letter-spacing="4" font-weight="400">LABS</text>
  </g>
  
  <!-- VARIANT 6: Favicon/App Icon -->
  <g transform="translate(520, 400)">
    <text x="0" y="-15" font-family="Georgia, serif" font-size="11" fill="#666" letter-spacing="2">FAVICON / APP ICON</text>
    
    <rect x="0" y="0" width="100" height="100" rx="16" fill="#1a1a2e"/>
    
    <circle cx="50" cy="50" r="36" fill="none" stroke="#fafafa" stroke-width="1.5" opacity="0.8"/>
    
    <path d="M 28 68 
             Q 28 32, 42 32 
             Q 50 32, 50 50 
             Q 50 32, 58 32 
             Q 72 32, 72 68" 
          fill="none" 
          stroke="#fafafa" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    
    <circle cx="28" cy="68" r="3" fill="#4a90a4"/>
    <circle cx="50" cy="50" r="4" fill="#4a90a4"/>
    <circle cx="72" cy="68" r="3" fill="#4a90a4"/>
    <circle cx="50" cy="40" r="2.5" fill="#fafafa"/>
    
    <!-- Small size test -->
    <rect x="130" y="25" width="50" height="50" rx="8" fill="#1a1a2e"/>
    <circle cx="155" cy="50" r="18" fill="none" stroke="#fafafa" stroke-width="1" opacity="0.8"/>
    <path d="M 144 59 Q 144 41, 151 41 Q 155 41, 155 50 Q 155 41, 159 41 Q 166 41, 166 59" 
          fill="none" stroke="#fafafa" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="144" cy="59" r="1.5" fill="#4a90a4"/>
    <circle cx="155" cy="50" r="2" fill="#4a90a4"/>
    <circle cx="166" cy="59" r="1.5" fill="#4a90a4"/>
  </g>
  
  <!-- Design Notes -->
  <g transform="translate(100, 540)">
    <text font-family="Georgia, serif" font-size="10" fill="#888">
      <tspan x="0" y="0">Symbol encodes: Neural pathway (M abstraction) • Closed feedback loop (outer ring) • Signal nodes (activation points) • Recursive intelligence (central convergence)</tspan>
      <tspan x="0" y="16">Color: Sovereign navy (#1a1a2e) + Cognitive teal (#4a90a4) • Typography: Playfair Display (authority) + Work Sans (precision)</tspan>
    </text>
  </g>
  
</svg>
